<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CoinQuest v0.1</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.4rem; }
  form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  label { font-size: 0.85rem; color: #444; }
  input, select { padding: 6px; font-size: 1rem; }
  button { padding: 8px; font-size: 1rem; cursor: pointer; }
  ul { list-style: none; padding: 0; }
  li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; }
  .amount { font-weight: bold; }
</style>
</head>
<body>
  <h1>CoinQuest — expenses</h1>

  <form id="expense-form">
    <label>Amount (SAR)
      <input type="number" id="amount" step="0.01" min="0" required>
    </label>
    <label>Category
      <select id="category" required>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
    </label>
    <label>Note
      <input type="text" id="note">
    </label>
    <label>Date
      <input type="date" id="date" required>
    </label>
    <button type="submit">Log expense</button>
  </form>

  <ul id="expense-list"></ul>

  <script>
    const form = document.getElementById("expense-form");
    const list = document.getElementById("expense-list");
    const dateInput = document.getElementById("date");

    dateInput.value = new Date().toISOString().slice(0, 10);

    async function loadExpenses() {
      const res = await fetch("/api/expenses");
      const expenses = await res.json();
      list.innerHTML = "";
      for (const e of expenses) {
        const li = document.createElement("li");
        li.innerHTML = `
          <span>${e.spent_on} — ${e.category}${e.note ? " (" + e.note + ")" : ""}</span>
          <span class="amount">${e.amount.toFixed(2)} SAR</span>
        `;
        list.appendChild(li);
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      await fetch("/api/expenses", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          amount: parseFloat(document.getElementById("amount").value),
          category: document.getElementById("category").value,
          note: document.getElementById("note").value,
          date: dateInput.value,
        }),
      });
      form.reset();
      dateInput.value = new Date().toISOString().slice(0, 10);
      loadExpenses();
    });

    loadExpenses();
  </script>
</body>
</html>
