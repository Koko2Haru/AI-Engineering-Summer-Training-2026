<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coddiction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.5;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
        }

        /* Start Screen */
        #startScreen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            gap: 40px;
        }

        .game-title {
            font-size: 64px;
            font-weight: bold;
            color: #58a6ff;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 20px;
            color: #8b949e;
            margin-bottom: 40px;
        }

        .session-picker {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .session-btn {
            width: 80px;
            height: 80px;
            font-size: 32px;
            font-weight: bold;
            border: 2px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .session-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .session-btn.selected {
            background: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
        }

        .start-btn {
            width: 200px;
            height: 60px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #3fb950;
            background: #0d1117;
            color: #3fb950;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .start-btn:hover {
            background: #3fb950;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.4);
        }

        /* Problem Screen */
        #problemScreen {
            background: #0d1117;
            gap: 0;
            flex-wrap: nowrap;
        }

        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 30px;
            font-size: 18px;
            color: #58a6ff;
            font-weight: bold;
        }

        .problem-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .problem-panel {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            border-right: 2px solid #30363d;
            background: #0d1117;
        }

        .problem-title {
            font-size: 28px;
            color: #58a6ff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .difficulty-badge.gateway {
            background: #3fb950;
            color: #0d1117;
        }

        .difficulty-badge.habit {
            background: #d29922;
            color: #0d1117;
        }

        .difficulty-badge.dependency {
            background: #f85149;
            color: #0d1117;
        }

        .problem-statement {
            font-size: 16px;
            color: #c9d1d9;
            margin-bottom: 30px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .signature-box {
            background: #161b22;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            color: #79c0ff;
            font-size: 14px;
            border-left: 3px solid #58a6ff;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .tests-title {
            font-size: 16px;
            color: #58a6ff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .test-case {
            background: #161b22;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            border-left: 3px solid #79c0ff;
        }

        .test-input,
        .test-expected {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .test-input:last-child {
            margin-bottom: 0;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            padding: 20px;
        }

        .editor-header {
            font-size: 16px;
            color: #8b949e;
            margin-bottom: 10px;
        }

        #codeEditor {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            border: 2px solid #30363d;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            border-radius: 4px;
            overflow-y: auto;
        }

        #codeEditor:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid;
            background: #0d1117;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }

        .btn-run {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .btn-run:hover {
            background: #58a6ff;
            color: #0d1117;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        .btn-submit {
            border-color: #3fb950;
            color: #3fb950;
        }

        .btn-submit:hover {
            background: #3fb950;
            color: #0d1117;
            box-shadow: 0 0 10px rgba(63, 185, 80, 0.3);
        }

        .btn-skip {
            border-color: #f85149;
            color: #f85149;
        }

        .btn-skip:hover {
            background: #f85149;
            color: #0d1117;
            box-shadow: 0 0 10px rgba(248, 81, 73, 0.3);
        }

        .results-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 15px;
            background: #161b22;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #30363d;
            font-size: 13px;
        }

        .test-result {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 3px;
            border-left: 3px solid;
        }

        .test-result.pass {
            background: #0d3817;
            border-left-color: #3fb950;
            color: #3fb950;
        }

        .test-result.fail {
            background: #3d1f1a;
            border-left-color: #f85149;
            color: #f85149;
        }

        .test-result.error {
            background: #3d2817;
            border-left-color: #d29922;
            color: #d29922;
        }

        .test-result-detail {
            font-size: 12px;
            margin-top: 5px;
            color: #c9d1d9;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Ending Screen */
        #endingScreen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            gap: 40px;
        }

        .ending-stats {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            text-align: center;
        }

        .solved-count {
            font-size: 36px;
            color: #58a6ff;
            font-weight: bold;
        }

        .final-score {
            font-size: 48px;
            color: #3fb950;
            font-weight: bold;
        }

        .rank-title {
            font-size: 40px;
            color: #d29922;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(210, 153, 34, 0.3);
        }

        .play-again-btn {
            width: 200px;
            height: 60px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #3fb950;
            background: #0d1117;
            color: #3fb950;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .play-again-btn:hover {
            background: #3fb950;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.4);
        }

        .verdict-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 30px;
        }

        .verdict-overlay.show {
            display: flex;
        }

        .verdict-text {
            font-size: 60px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .verdict-text.accepted {
            color: #3fb950;
            text-shadow: 0 0 20px rgba(63, 185, 80, 0.6);
        }

        .verdict-text.wrong {
            color: #f85149;
        }

        .verdict-text.error {
            color: #d29922;
        }

        .verdict-text.timeout {
            color: #f85149;
        }

        .verdict-detail {
            font-size: 16px;
            color: #c9d1d9;
            max-width: 600px;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        @media (max-width: 1200px) {
            .problem-container {
                flex-direction: column;
            }

            .problem-panel {
                border-right: none;
                border-bottom: 2px solid #30363d;
                flex: 0 0 auto;
                max-height: 40%;
            }

            .editor-panel {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <div class="game-title">CODDICTION</div>
        <div class="tagline">One more problem. Just one more.</div>
        <div class="session-picker">
            <button class="session-btn" data-problems="3">3</button>
            <button class="session-btn" data-problems="4">4</button>
            <button class="session-btn" data-problems="5">5</button>
            <button class="session-btn" data-problems="6">6</button>
        </div>
        <button class="start-btn">Start</button>
    </div>

    <!-- Problem Screen -->
    <div id="problemScreen" class="screen">
        <div class="hud">
            <div>⏱️ <span id="timer">00:00</span></div>
            <div>📊 <span id="score">0</span></div>
            <div id="progress">1/3</div>
        </div>
        <div class="problem-container">
            <div class="problem-panel">
                <div class="problem-title" id="problemTitle">Problem</div>
                <div class="difficulty-badge" id="difficultyBadge">Gateway</div>
                <div class="problem-statement" id="problemStatement"></div>
                <div class="signature-box" id="signature"></div>
                <div class="tests-title">Visible Tests</div>
                <div id="visibleTestsContainer"></div>
            </div>
            <div class="editor-panel">
                <div class="editor-header">Code Editor</div>
                <textarea id="codeEditor" spellcheck="false"></textarea>
                <div class="button-group">
                    <button class="btn btn-run">Run</button>
                    <button class="btn btn-submit">Submit</button>
                    <button class="btn btn-skip">Skip</button>
                </div>
                <div class="results-container" id="resultsContainer"></div>
            </div>
        </div>
    </div>

    <!-- Ending Screen -->
    <div id="endingScreen" class="screen">
        <div class="ending-stats">
            <div class="solved-count" id="solvedCount">You solved 0 / 3</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="rank-title" id="rankTitle">Clean</div>
        </div>
        <button class="play-again-btn">Play again</button>
    </div>

    <!-- Verdict Overlay -->
    <div id="verdictOverlay" class="verdict-overlay">
        <div class="verdict-text" id="verdictText"></div>
        <div class="verdict-detail" id="verdictDetail"></div>
    </div>

    <script>
        // ============================================================================
        // BUILT-IN PROBLEMS
        // ============================================================================

        const PROBLEMS = [
            {
                id: "array-sum",
                title: "Array Sum",
                difficulty: "gateway",
                statement: "Given an array of numbers, return the sum of all elements.",
                signature: "function solve(arr)",
                visibleTests: [
                    { input: [[1, 2, 3]], expected: 6 },
                    { input: [[10, 20]], expected: 30 }
                ],
                hiddenTests: [
                    { input: [[]], expected: 0 },
                    { input: [[5]], expected: 5 },
                    { input: [[-1, -2, 3]], expected: 0 }
                ]
            },
            {
                id: "max-element",
                title: "Find Maximum",
                difficulty: "gateway",
                statement: "Given an array of numbers, return the largest element.",
                signature: "function solve(arr)",
                visibleTests: [
                    { input: [[1, 5, 3]], expected: 5 },
                    { input: [[10, 2, 8]], expected: 10 }
                ],
                hiddenTests: [
                    { input: [[1]], expected: 1 },
                    { input: [[-5, -2, -10]], expected: -2 },
                    { input: [[0, 0, 0]], expected: 0 }
                ]
            },
            {
                id: "two-sum",
                title: "Two Sum",
                difficulty: "habit",
                statement: "Given an array of numbers and a target sum, return the indices of two numbers that add up to the target. Each input has exactly one such pair; return the indices in increasing order.",
                signature: "function solve(arr, target)",
                visibleTests: [
                    { input: [[2, 7, 11, 15], 9], expected: [0, 1] },
                    { input: [[3, 2, 4], 6], expected: [1, 2] }
                ],
                hiddenTests: [
                    { input: [[1, 2], 3], expected: [0, 1] },
                    { input: [[10, 20, 30, 40], 70], expected: [2, 3] },
                    { input: [[5, 5], 10], expected: [0, 1] }
                ]
            },
            {
                id: "palindrome-check",
                title: "Check Palindrome",
                difficulty: "habit",
                statement: "Given a string, return true if it is a palindrome (reads the same forwards and backwards), false otherwise.",
                signature: "function solve(str)",
                visibleTests: [
                    { input: ["racecar"], expected: true },
                    { input: ["hello"], expected: false }
                ],
                hiddenTests: [
                    { input: ["a"], expected: true },
                    { input: [""], expected: true },
                    { input: ["noon"], expected: true }
                ]
            },
            {
                id: "count-occurrences",
                title: "Count Character Occurrences",
                difficulty: "dependency",
                statement: "Given a string and a character, count how many times the character appears in the string.",
                signature: "function solve(str, char)",
                visibleTests: [
                    { input: ["hello", "l"], expected: 2 },
                    { input: ["programming", "g"], expected: 2 }
                ],
                hiddenTests: [
                    { input: ["aaa", "a"], expected: 3 },
                    { input: ["xyz", "a"], expected: 0 },
                    { input: ["", "x"], expected: 0 }
                ]
            },
            {
                id: "fibonacci",
                title: "Fibonacci Sequence",
                difficulty: "dependency",
                statement: "Given a number n, return the nth Fibonacci number (0-indexed: F(0)=0, F(1)=1, F(2)=1, F(3)=2, ...).",
                signature: "function solve(n)",
                visibleTests: [
                    { input: [5], expected: 5 },
                    { input: [6], expected: 8 }
                ],
                hiddenTests: [
                    { input: [0], expected: 0 },
                    { input: [1], expected: 1 },
                    { input: [7], expected: 13 }
                ]
            }
        ];

        // ============================================================================
        // GAME STATE
        // ============================================================================

        let gameState = {
            sessionLength: 0,
            selectedProblems: [],
            currentProblemIndex: 0,
            score: 0,
            solved: 0,
            totalProblems: 0,
            timeRemaining: 0,
            timerInterval: null
        };

        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================

        function deepEqual(a, b) {
            if (a === b) return true;
            if (a == null || b == null) return false;
            if (typeof a !== typeof b) return false;

            if (Array.isArray(a) && Array.isArray(b)) {
                if (a.length !== b.length) return false;
                for (let i = 0; i < a.length; i++) {
                    if (!deepEqual(a[i], b[i])) return false;
                }
                return true;
            }

            if (typeof a === 'object' && typeof b === 'object') {
                const keysA = Object.keys(a);
                const keysB = Object.keys(b);
                if (keysA.length !== keysB.length) return false;
                for (let key of keysA) {
                    if (!deepEqual(a[key], b[key])) return false;
                }
                return true;
            }

            return false;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function selectRandomProblems(count) {
            const problems = [...PROBLEMS];
            const selected = [];

            for (let i = 0; i < count; i++) {
                const idx = Math.floor(Math.random() * problems.length);
                selected.push(problems[idx]);
                problems.splice(idx, 1);
            }

            selected.sort((a, b) => {
                const diffOrder = { gateway: 1, habit: 2, dependency: 3 };
                return diffOrder[a.difficulty] - diffOrder[b.difficulty];
            });

            return selected;
        }

        // ============================================================================
        // SCREEN MANAGEMENT
        // ============================================================================

        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenName).classList.add('active');
        }

        function renderProblem() {
            const problem = gameState.selectedProblems[gameState.currentProblemIndex];

            document.getElementById('problemTitle').textContent = problem.title;
            document.getElementById('difficultyBadge').textContent = problem.difficulty.toUpperCase();
            document.getElementById('difficultyBadge').className = `difficulty-badge ${problem.difficulty}`;
            document.getElementById('problemStatement').textContent = problem.statement;
            document.getElementById('signature').textContent = problem.signature;
            document.getElementById('progress').textContent = `${gameState.currentProblemIndex + 1}/${gameState.totalProblems}`;

            const visibleContainer = document.getElementById('visibleTestsContainer');
            visibleContainer.innerHTML = '';
            for (let test of problem.visibleTests) {
                const div = document.createElement('div');
                div.className = 'test-case';
                div.innerHTML = `
                    <div class="test-input"><strong>Input:</strong> ${JSON.stringify(test.input)}</div>
                    <div class="test-expected"><strong>Expected:</strong> ${JSON.stringify(test.expected)}</div>
                `;
                visibleContainer.appendChild(div);
            }

            const editor = document.getElementById('codeEditor');
            editor.value = problem.signature + ' {\n  // your code\n}';
            editor.focus();

            document.getElementById('resultsContainer').innerHTML = '';
        }

        function updateHUD() {
            document.getElementById('timer').textContent = formatTime(gameState.timeRemaining);
            document.getElementById('score').textContent = gameState.score;
        }

        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timeRemaining--;
                updateHUD();

                if (gameState.timeRemaining <= 0) {
                    clearInterval(gameState.timerInterval);
                    endSession();
                }
            }, 1000);
        }

        // ============================================================================
        // JUDGING & EXECUTION
        // ============================================================================

        function createWorker() {
            const blob = new Blob([`
                let solve;
                self.onmessage = (event) => {
                    const { code, tests, testType } = event.data;
                    try {
                        eval(code);
                        if (typeof solve !== 'function') {
                            self.postMessage({ status: 'error', error: 'solve is not defined' });
                            return;
                        }
                        const results = [];
                        for (let test of tests) {
                            try {
                                const start = Date.now();
                                const actual = solve(...test.input);
                                const elapsed = Date.now() - start;
                                results.push({
                                    input: test.input,
                                    expected: test.expected,
                                    actual: actual,
                                    passed: deepEqual(actual, test.expected),
                                    error: null,
                                    timeout: false,
                                    elapsed
                                });
                            } catch (err) {
                                results.push({
                                    input: test.input,
                                    expected: test.expected,
                                    actual: null,
                                    passed: false,
                                    error: err.message,
                                    timeout: false,
                                    elapsed: 0
                                });
                            }
                        }
                        self.postMessage({ status: 'complete', results });
                    } catch (err) {
                        self.postMessage({ status: 'error', error: err.message });
                    }
                };

                function deepEqual(a, b) {
                    if (a === b) return true;
                    if (a == null || b == null) return false;
                    if (typeof a !== typeof b) return false;
                    if (Array.isArray(a) && Array.isArray(b)) {
                        if (a.length !== b.length) return false;
                        for (let i = 0; i < a.length; i++) {
                            if (!deepEqual(a[i], b[i])) return false;
                        }
                        return true;
                    }
                    if (typeof a === 'object' && typeof b === 'object') {
                        const keysA = Object.keys(a);
                        const keysB = Object.keys(b);
                        if (keysA.length !== keysB.length) return false;
                        for (let key of keysA) {
                            if (!deepEqual(a[key], b[key])) return false;
                        }
                        return true;
                    }
                    return false;
                }
            `], { type: 'application/javascript' });
            return new Worker(URL.createObjectURL(blob));
        }

        function executeCode(code, tests, isSubmit = false) {
            return new Promise((resolve) => {
                const worker = createWorker();
                const timeout = setTimeout(() => {
                    worker.terminate();
                    resolve({ status: 'timeout' });
                }, 3000);

                worker.onmessage = (event) => {
                    clearTimeout(timeout);
                    worker.terminate();
                    resolve(event.data);
                };

                worker.postMessage({ code, tests, testType: isSubmit ? 'submit' : 'run' });
            });
        }

        async function runTests() {
            const problem = gameState.selectedProblems[gameState.currentProblemIndex];
            const code = document.getElementById('codeEditor').value;
            const resultsContainer = document.getElementById('resultsContainer');

            resultsContainer.innerHTML = '<div style="color: #8b949e;">Running tests...</div>';

            const result = await executeCode(code, problem.visibleTests, false);

            if (result.status === 'error') {
                resultsContainer.innerHTML = `<div class="test-result error"><strong>Error:</strong><div class="test-result-detail">${result.error}</div></div>`;
                return;
            }

            if (result.status === 'timeout') {
                resultsContainer.innerHTML = `<div class="test-result fail"><strong>Time Limit Exceeded</strong></div>`;
                return;
            }

            resultsContainer.innerHTML = '';
            for (let i = 0; i < result.results.length; i++) {
                const res = result.results[i];
                const div = document.createElement('div');
                div.className = `test-result ${res.passed ? 'pass' : 'fail'}`;

                if (res.passed) {
                    div.innerHTML = `<strong>Test ${i + 1}:</strong> PASS`;
                } else if (res.error) {
                    div.innerHTML = `<strong>Test ${i + 1}:</strong> ERROR<div class="test-result-detail">${res.error}</div>`;
                } else {
                    div.innerHTML = `
                        <strong>Test ${i + 1}:</strong> FAIL
                        <div class="test-result-detail">
Input:    ${JSON.stringify(res.input)}
Expected: ${JSON.stringify(res.expected)}
Actual:   ${JSON.stringify(res.actual)}
                        </div>
                    `;
                }
                resultsContainer.appendChild(div);
            }
        }

        async function submitCode() {
            const problem = gameState.selectedProblems[gameState.currentProblemIndex];
            const code = document.getElementById('codeEditor').value;
            const allTests = [...problem.visibleTests, ...problem.hiddenTests];

            const result = await executeCode(code, allTests, true);

            if (result.status === 'timeout') {
                showVerdict('timeout', 'Time Limit Exceeded');
                return;
            }

            if (result.status === 'error') {
                showVerdict('error', `Runtime Error:\n${result.error}`);
                return;
            }

            const allPassed = result.results.every(r => r.passed);
            const firstFailIdx = result.results.findIndex(r => !r.passed);

            if (allPassed) {
                const points = problem.difficulty === 'gateway' ? 100 : problem.difficulty === 'habit' ? 250 : 500;
                gameState.score += points;
                gameState.solved++;
                showVerdict('accepted', `Accepted!\n+${points} points`);
                setTimeout(nextProblem, 2000);
            } else {
                const failRes = result.results[firstFailIdx];
                let detail = 'Wrong Answer';
                if (firstFailIdx < problem.visibleTests.length) {
                    detail += `\nInput:    ${JSON.stringify(failRes.input)}\nExpected: ${JSON.stringify(failRes.expected)}\nActual:   ${JSON.stringify(failRes.actual)}`;
                } else {
                    detail += '\nFailed hidden test';
                }
                showVerdict('wrong', detail);
            }
        }

        function showVerdict(type, message) {
            const overlay = document.getElementById('verdictOverlay');
            const text = document.getElementById('verdictText');
            const detail = document.getElementById('verdictDetail');

            text.className = `verdict-text ${type === 'accepted' ? 'accepted' : type === 'wrong' ? 'wrong' : type === 'timeout' ? 'timeout' : 'error'}`;
            text.textContent = type === 'accepted' ? 'ACCEPTED' : type === 'wrong' ? 'WRONG ANSWER' : type === 'timeout' ? 'TIME LIMIT EXCEEDED' : 'RUNTIME ERROR';
            detail.textContent = message;

            overlay.classList.add('show');
            setTimeout(() => overlay.classList.remove('show'), type === 'accepted' ? 2500 : 3000);
        }

        function skipProblem() {
            nextProblem();
        }

        function nextProblem() {
            gameState.currentProblemIndex++;
            if (gameState.currentProblemIndex >= gameState.totalProblems) {
                endSession();
            } else {
                renderProblem();
                updateHUD();
            }
        }

        function endSession() {
            clearInterval(gameState.timerInterval);

            const solveRatio = gameState.solved / gameState.totalProblems;
            let rank = 'Clean';
            if (solveRatio >= 1) rank = 'Fully Addicted';
            else if (solveRatio >= 0.5) rank = 'Hooked';
            else if (solveRatio > 0) rank = 'Casual User';

            document.getElementById('solvedCount').textContent = `You solved ${gameState.solved} / ${gameState.totalProblems}`;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('rankTitle').textContent = rank;

            showScreen('endingScreen');
        }

        // ============================================================================
        // TAB KEY SUPPORT
        // ============================================================================

        document.getElementById('codeEditor').addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const textarea = e.target;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                textarea.value = textarea.value.substring(0, start) + '\t' + textarea.value.substring(end);
                textarea.selectionStart = textarea.selectionEnd = start + 1;
            }
        });

        // ============================================================================
        // EVENT LISTENERS
        // ============================================================================

        document.querySelectorAll('.session-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                gameState.sessionLength = parseInt(btn.dataset.problems);
            });
        });

        document.querySelectorAll('.start-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameState.sessionLength === 0) {
                    alert('Please select a session length!');
                    return;
                }

                gameState.selectedProblems = selectRandomProblems(gameState.sessionLength);
                gameState.currentProblemIndex = 0;
                gameState.score = 0;
                gameState.solved = 0;
                gameState.totalProblems = gameState.sessionLength;
                gameState.timeRemaining = gameState.sessionLength * 300;

                showScreen('problemScreen');
                renderProblem();
                updateHUD();
                startTimer();
            });
        });

        document.querySelectorAll('.btn-run').forEach(btn => {
            btn.addEventListener('click', runTests);
        });

        document.querySelectorAll('.btn-submit').forEach(btn => {
            btn.addEventListener('click', submitCode);
        });

        document.querySelectorAll('.btn-skip').forEach(btn => {
            btn.addEventListener('click', skipProblem);
        });

        document.querySelectorAll('.play-again-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('selected'));
                gameState.sessionLength = 0;
                showScreen('startScreen');
            });
        });
    </script>
</body>
</html>
